<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento com CSS Inline</title>
</head>
<body style="font-family: Arial, sans-serif;">

    
    <h1 id="titulo_seletor" style="color: blue;">Meu seletor principal css</h1>

    <input type="text" style="border: 2px solid blue;">
    
    <div class="card" style="border: 1px solid #ccc; padding: 10px; margin: 10px;">
        
       
        <p style="color: #333;">Este parágrafo é estilizado pelo seletor de elemento.</p>
        
       
        <a href="#" style="color: #007bff; text-decoration: underline;">Link com seletor combinador</a>
    </div>

    <div class="card" style="border: 1px solid #ccc; padding: 10px; margin: 10px;">
        <p style="color: #333;">
            Nota: O efeito :hover não funciona diretamente em atributos style inline.
        </p>
    </div>

</body>
</html>
